<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>용사 키우기</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <!-- View: Login / Role Selection -->
        <div id="view-login" class="view active">
            <div class="panel login-panel">
                <h1 class="game-title">용사 키우기</h1>
                <p class="subtitle">당신의 역할을 선택하세요</p>
                <div id="role-selection" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="app.showLogin('teacher')">교사</button>
                    <button class="btn btn-secondary" onclick="app.showLogin('student')">학생</button>
                </div>
                
                <!-- Email/Password Login Form -->
                <div id="auth-form" class="hidden" style="margin-top: 20px; border-top: 3px dashed var(--panel-border); padding-top: 20px;">
                    <h3 id="auth-title">로그인</h3>
                    <input type="text" id="auth-nickname" class="input-text" placeholder="닉네임 (아이디)" style="width:100%; margin-bottom:10px;">
                    <input type="password" id="auth-password" class="input-text" placeholder="비밀번호" style="width:100%; margin-bottom:10px;">
                    
                    <!-- Only for student signup -->
                    <div id="signup-extra" class="hidden">
                        <!-- 이름(닉네임)은 auth-nickname 필드를 공통으로 사용 -->
                        <div class="gender-select" style="margin-bottom:10px;">
                            <label><input type="radio" name="auth-gender" value="male" checked> 남</label>
                            <label><input type="radio" name="auth-gender" value="female"> 여</label>
                        </div>
                        <input type="text" id="auth-student-invite-code" class="input-text" placeholder="학급 초대 코드 (필수)" style="width:100%; margin-bottom:10px;">
                    </div>
                    
                    <!-- Only for teacher signup -->
                    <div id="teacher-signup-extra" class="hidden" style="margin-bottom:10px;">
                        <input type="text" id="auth-teacher-code" class="input-text" placeholder="교사 인증 코드 (8자리)" style="width:100%;">
                    </div>
                    
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button class="btn btn-primary" id="auth-submit-btn" onclick="app.submitAuth()">로그인</button>
                        <button class="btn btn-secondary" id="auth-toggle-btn" onclick="app.toggleAuthMode()">회원가입하기</button>
                    </div>
                    <button class="btn btn-small" style="margin-top:15px; width:100%" onclick="app.showRoleSelection()">뒤로가기</button>
                </div>
            </div>
        </div>

        <!-- View: Teacher Dashboard -->
        <div id="view-teacher" class="view">
            <header class="game-header">
                <h2>교사 대시보드</h2>
                <button class="btn btn-small" onclick="app.logout()">종료</button>
            </header>
            
            <!-- Class Management UI -->
            <div id="teacher-class-setup" class="panel hidden" style="text-align: center; margin-bottom: 20px;">
                <h3>내 학급 만들기</h3>
                <p style="margin-bottom: 15px;">운영 중인 학급이 없습니다. 학급 이름을 입력하고 학생들을 초대하세요!</p>
                <input type="text" id="new-class-name" class="input-text" placeholder="학급 이름 (예: 수리초 6학년 1반)" style="width: 80%; max-width: 300px; margin-bottom: 10px;">
                <br>
                <button class="btn btn-primary" onclick="app.createClass()">학급 생성 및 초대코드 발급</button>
            </div>

            <div id="teacher-class-info" class="panel hidden" style="margin-bottom: 20px; background-color: rgba(255, 215, 0, 0.1); border-color: #ffd700;">
                <h3 id="display-class-name" style="margin-top: 0; color: #d35400;">학급 이름</h3>
                <p style="font-size: 1.1rem; margin-bottom: 0;">
                    가입용 초대 코드: <strong id="display-invite-code" style="font-size: 1.4rem; color: #e74c3c; user-select: all; cursor: pointer;" title="더블 클릭하여 복사"></strong>
                </p>
            </div>

            <div id="teacher-dashboard-main" class="hidden">
                <div class="teacher-controls panel">
                    <h3>학생 포인트 관리</h3>
                    <div class="eval-actions">
                        <!-- Custom and default buttons will be rendered here by JS -->
                    </div>
                    <div class="custom-eval" style="margin-top: 15px;">
                        <input type="number" id="custom-point" class="input-number" value="10" style="width: 60px;">
                        <input type="text" id="custom-reason" class="input-text" placeholder="사유 입력 (예: 발표)">
                        <button class="btn btn-secondary" onclick="app.giveCustomPoints()">부여</button>
                        <button class="btn btn-small" style="background-color: #9b59b6; color: white; padding: 10px 15px; font-size: 1rem; border: 3px solid #000; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), inset -2px -2px 0 rgba(0,0,0,0.2), 2px 2px 0 rgba(0,0,0,0.5);" onclick="app.saveCustomButton()">+ 버튼 추가</button>
                    </div>
                </div>

                <div class="student-list panel">
                    <div class="list-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--panel-border); padding-bottom: 10px; margin-bottom: 15px;">
                        <h3 style="margin: 0; border: none; padding: 0;">학생 목록</h3>
                        <label style="cursor: pointer; font-weight: bold;">
                            <input type="checkbox" id="check-all" onclick="app.toggleCheckAll()"> 전체 선택
                        </label>
                    </div>
                    <div id="student-rows" class="student-grid">
                        <!-- Student rows will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Student Dashboard -->
        <div id="view-student" class="view">
            <header class="game-header">
                <h2>내 상태창</h2>
                <button class="btn btn-small" onclick="app.logout()">로그아웃</button>
            </header>

            <div class="student-main">
                <div class="character-display panel">
                    <h3 id="student-display-name">이름</h3>
                    <div class="character-image-container">
                        <!-- We use CSS classes (egg, basic, evo, final) to show different stages -->
                        <div id="character-sprite" class="sprite egg"></div>
                    </div>
                    <div class="job-badge" id="job-badge">기사</div>
                    <div class="stage-badge" id="stage-badge">알 (1단계)</div>
                </div>

                <div class="status-panel panel">
                    <h3>성장 게이지</h3>
                    <div class="exp-bar-container">
                        <div class="exp-bar-fill" id="exp-bar"></div>
                        <div class="exp-text" id="exp-text">0 / 100</div>
                    </div>
                    <div class="next-unlock" id="next-unlock">다음 직업: 마법사</div>
                    
                    <h3 style="margin-top:20px;">모험 기록</h3>
                    <div class="history-log" id="history-log">
                        <!-- Points history -->
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="site-footer">
            <div class="footer-links">
                <a href="javascript:void(0)" onclick="app.showModal('terms')">이용약관</a>
                <span class="divider">|</span>
                <a href="javascript:void(0)" onclick="app.showModal('privacy')">개인정보처리방침</a>
            </div>
            <div class="footer-info">
                정보관리책임자: 양수빈 교사 (서울수리초등학교)<br>
                &copy; 2026 용사 키우기. All rights reserved.
            </div>
        </footer>

        <!-- Info Modal -->
        <div id="info-modal" class="modal">
            <div class="modal-content panel">
                <span class="close-btn" onclick="app.closeModal()">&times;</span>
                <h2 id="modal-title" class="game-header" style="margin-top: 0; margin-bottom: 20px;">제목</h2>
                <div id="modal-body" class="modal-body-content">
                    내용
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
